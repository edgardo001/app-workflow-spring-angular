server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: workflow-net

  data:
    mongodb:
      uri: mongodb://${MONGO_ROOT_USER:root}:${MONGO_ROOT_PASSWORD:changeme}@${MONGODB_HOST:localhost}:27017/${MONGO_DATABASE:workflow-spring}?authSource=admin
      auto-index-creation: true

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.type.mapping: >
          flow.created:com.workflowspring.flow.domain.event.FlowCreatedEvent,
          flow.started:com.workflowspring.flow.domain.event.FlowStartedEvent,
          flow.document.approved:com.workflowspring.flow.domain.event.DocumentApprovedEvent,
          flow.document.rejected:com.workflowspring.flow.domain.event.DocumentRejectedEvent,
          flow.expired:com.workflowspring.flow.domain.event.FlowExpiredEvent,
          flow.completed:com.workflowspring.flow.domain.event.FlowCompletedEvent,
          email.send:com.workflowspring.shared.event.EmailSendEvent,
          email.failed:com.workflowspring.shared.event.EmailFailedEvent
    consumer:
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"
        spring.json.type.mapping: >
          flow.created:com.workflowspring.flow.domain.event.FlowCreatedEvent,
          flow.started:com.workflowspring.flow.domain.event.FlowStartedEvent,
          flow.document.approved:com.workflowspring.flow.domain.event.DocumentApprovedEvent,
          flow.document.rejected:com.workflowspring.flow.domain.event.DocumentRejectedEvent,
          flow.expired:com.workflowspring.flow.domain.event.FlowExpiredEvent,
          flow.completed:com.workflowspring.flow.domain.event.FlowCompletedEvent,
          email.send:com.workflowspring.shared.event.EmailSendEvent,
          email.failed:com.workflowspring.shared.event.EmailFailedEvent

  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:1025}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${MAIL_SMTP_AUTH:false}
          starttls:
            enable: ${MAIL_STARTTLS_ENABLE:false}

  jackson:
    serialization:
      write-dates-as-timestamps: false
    date-format: yyyy-MM-dd'T'HH:mm:ss'Z'

github:
  client-id: ${GITHUB_CLIENT_ID:}
  client-secret: ${GITHUB_CLIENT_SECRET:}
  redirect-uri: ${GITHUB_REDIRECT_URI:http://localhost:8080/api/auth/github/callback}

app:
  frontend-url: ${APP_FRONTEND_URL:http://localhost:4200}

workflow:
  jwt:
    secret: ${JWT_SECRET:workflow-net-default-secret-key-change-in-production}
    expiration-ms: 86400000
  document:
    max-size-bytes: ${DOCUMENT_MAX_SIZE:2097152}
    max-count: ${DOCUMENT_MAX_COUNT:5}
    temp-storage: ${DOCUMENT_TEMP_STORAGE:./temp-documents}
  flow:
    grace-period-days: ${FLOW_GRACE_PERIOD_DAYS:3}
    deadline-check-cron: ${DEADLINE_CHECK_CRON:0 0 2 * * ?}
  email:
    retry:
      max-attempts: ${EMAIL_RETRY_MAX:5}
      initial-delay-ms: 300000
      multiplier: 3

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: when-authorized
      mail:
        enabled: false

springdoc:
  api-docs:
    enabled: ${SPRINGDOC_ENABLED:true}
    path: /api-docs
  swagger-ui:
    enabled: ${SPRINGDOC_ENABLED:true}
    path: /swagger-ui.html

logging:
  level:
    root: ${LOG_LEVEL_ROOT:WARN}
    com.workflowspring: ${LOG_LEVEL:INFO}
    org.springframework: ${LOG_LEVEL_SPRING:WARN}
    org.springframework.security: ${LOG_LEVEL_SECURITY:WARN}
    org.springframework.kafka: ${LOG_LEVEL_KAFKA:ERROR}
    org.apache.kafka: ${LOG_LEVEL_KAFKA:ERROR}
