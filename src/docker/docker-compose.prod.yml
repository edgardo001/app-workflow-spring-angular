# =============================================================================
# WorkflowNet — Docker Compose (Producción — servidor con Traefik existente)
# =============================================================================
# Este archivo es para servidores que YA TIENEN un Traefik corriendo.
# NO incluye Traefik. Usa la red existente "traefik-net" para que el
# Traefik externo descubra automáticamente estos contenedores via labels.
#
# Uso:
#   docker compose -f docker-compose.prod.yml --env-file .env up -d
#
# Requisitos en el servidor:
#   - Traefik corriendo en la red "traefik-net"
#   - DNS apuntando al servidor para:
#       - workflow-spring-angular-back.edgardovasquez.cl
#       - workflow-spring-angular-front.edgardovasquez.cl
#
# Imágenes de Docker Hub (pre-construidas por CI/CD):
#   - edgardo001/workflow-net-backend:latest
#   - edgardo001/workflow-net-frontend:latest
#
# Arquitectura:
#
#   Internet → Traefik (existente, no incluido)
#                    ├─ workflow-spring-angular-back  → Backend (Spring Boot)
#                    └─ workflow-spring-angular-front → Frontend (Nginx)
#                                                        ↕
#                                                  Backend ↔ MongoDB  Kafka
#                                                        ↕
#                                                  Prometheus → Grafana
# =============================================================================

services:
  # =============================================================================
  # MongoDB 8 — Base de datos
  # =============================================================================
  # No se expone al host (sin port mapping). Solo accesible dentro de la red Docker.
  # En desarrollo se usa localhost:27017, en producción solo los contenedores lo ven.
  mongodb:
    image: mongo:8
    container_name: workflow-mongodb
    restart: unless-stopped
    networks:
      - mvp-network
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER:?Debe definir MONGO_ROOT_USER en .env}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:?Debe definir MONGO_ROOT_PASSWORD en .env}
      MONGO_INITDB_DATABASE: ${MONGO_DATABASE:-workflow-net}
    volumes:
      - mongo-data:/data/db
      - ./mongo/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: mongosh --quiet --eval "db.runCommand({ping:1}).ok" -u ${MONGO_ROOT_USER} -p ${MONGO_ROOT_PASSWORD} --authenticationDatabase admin || exit 1
      interval: 60s
      timeout: 60s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 512M

  # =============================================================================
  # Kafka — Mensajería event-driven (KRaft mode, sin Zookeeper)
  # =============================================================================
  # Puerto 9092 NO se expone al host en producción.
  # Solo accesible desde otros contenedores en la misma red (Backend).
  kafka:
    image: apache/kafka:latest
    container_name: workflow-kafka
    restart: unless-stopped
    networks:
      - mvp-network
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: nc -z localhost 29092 || exit 1
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 120s
    deploy:
      resources:
        limits:
          memory: 512M

  # =============================================================================
  # Backend — Spring Boot (imagen de Docker Hub)
  # =============================================================================
  # Conectado a traefik-net para que el Traefik existente lo descubra via labels.
  # El Traefik escanea el Docker socket y detecta los labels para crear las rutas.
  backend:
    image: edgardo001/workflow-net-backend:latest
    container_name: workflow-backend
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - mvp-network       # Comunicación interna con MongoDB y Kafka
      - traefik-net        # Traefik descubre este contenedor via Docker socket
    environment:
      SERVER_PORT: 8080
      MONGO_ROOT_USER: ${MONGO_ROOT_USER:?Debe definir MONGO_ROOT_USER en .env}
      MONGO_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:?Debe definir MONGO_ROOT_PASSWORD en .env}
      MONGO_DATABASE: ${MONGO_DATABASE:-workflow-net}
      MONGODB_HOST: mongodb
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      MAIL_HOST: ${MAIL_HOST:?Debe definir MAIL_HOST en .env}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME:?Debe definir MAIL_USERNAME en .env}
      MAIL_PASSWORD: ${MAIL_PASSWORD:?Debe definir MAIL_PASSWORD en .env}
      MAIL_SMTP_AUTH: ${MAIL_SMTP_AUTH:-true}
      MAIL_STARTTLS_ENABLE: ${MAIL_STARTTLS_ENABLE:-true}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:?Debe definir GITHUB_CLIENT_ID en .env}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:?Debe definir GITHUB_CLIENT_SECRET en .env}
      GITHUB_REDIRECT_URI: ${GITHUB_REDIRECT_URI:?Debe definir GITHUB_REDIRECT_URI en .env}
      APP_FRONTEND_URL: https://workflow-spring-angular-front.edgardovasquez.cl
      JWT_SECRET: ${JWT_SECRET:?Debe definir JWT_SECRET en .env}
      FLOW_GRACE_PERIOD_DAYS: ${FLOW_GRACE_PERIOD_DAYS:-3}
      DOCUMENT_MAX_SIZE: ${DOCUMENT_MAX_SIZE:-2097152}
      DOCUMENT_MAX_COUNT: ${DOCUMENT_MAX_COUNT:-5}
      SPRINGDOC_ENABLED: ${SPRINGDOC_ENABLED:-false}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LOG_LEVEL_ROOT: ${LOG_LEVEL_ROOT:-WARN}
      LOG_LEVEL_SPRING: ${LOG_LEVEL_SPRING:-WARN}
      LOG_LEVEL_SECURITY: ${LOG_LEVEL_SECURITY:-WARN}
      LOG_LEVEL_KAFKA: ${LOG_LEVEL_KAFKA:-WARN}
    volumes:
      - temp-docs:/app/temp-documents
    labels:
      # --- Traefik Routing ---
      # Estas labels son leídas por el Traefik EXTERNO a través del Docker socket.
      # Traefik crea automáticamente una ruta: Host(`workflow-spring-angular-back.edgardovasquez.cl`)
      # → workflow-backend:8080
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-net"
      - "traefik.http.routers.workflow-backend.rule=Host(`workflow-spring-angular-back.edgardovasquez.cl`)"
      - "traefik.http.routers.workflow-backend.entrypoints=websecure"
      - "traefik.http.routers.workflow-backend.tls.certresolver=letsencrypt"
      - "traefik.http.services.workflow-backend.loadbalancer.server.port=8080"
    healthcheck:
      test: nc -z localhost 8080 || exit 1
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 180s
    deploy:
      resources:
        limits:
          memory: 512M

  # =============================================================================
  # Frontend — Angular SPA / Nginx (imagen de Docker Hub)
  # =============================================================================
  # Nginx sirve la SPA Angular y proxya /api/ al Backend.
  # El Traefik existente routa https://workflow-spring-angular-front.edgardovasquez.cl → este contenedor.
  frontend:
    image: edgardo001/workflow-net-frontend:latest
    container_name: workflow-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - mvp-network
      - traefik-net
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-net"
      - "traefik.http.routers.workflow-frontend.rule=Host(`workflow-spring-angular-front.edgardovasquez.cl`)"
      - "traefik.http.routers.workflow-frontend.entrypoints=websecure"
      - "traefik.http.routers.workflow-frontend.tls.certresolver=letsencrypt"
      - "traefik.http.services.workflow-frontend.loadbalancer.server.port=80"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:80/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 128M

  # =============================================================================
  # Traefik — Reverse Proxy / TLS Termination
  # =============================================================================
  # IMPORTANTE: Este Traefik YA está corriendo en el servidor (creado por
  # app-base-net-react). NO descomentes este bloque a menos que necesites
  # un Traefik dedicado para WorkflowNet.
  #
  # Configuración clonada de: app-base-net-react/src/docker/docker-compose.yml
  # Usa el mismo acme.json, traefik.yml, y red traefik-net.
  #
  # traefik:
  #   image: traefik:v3.7.1
  #   container_name: traefik
  #   restart: unless-stopped
  #   security_opt:
  #     - no-new-privileges:true
  #   networks:
  #     - traefik-net
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   environment:
  #     - CF_DNS_API_TOKEN=${CF_DNS_API_TOKEN:?Debe definir CF_DNS_API_TOKEN en .env}
  #   volumes:
  #     - /var/run/docker.sock:/var/run/docker.sock:ro
  #     - ./traefik.yml:/etc/traefik/traefik.yml:ro
  #     - ./data/acme.json:/etc/traefik/acme/acme.json
  #   labels:
  #     - "traefik.enable=true"
  #     - "traefik.http.routers.traefik.entrypoints=websecure"
  #     - "traefik.http.routers.traefik.rule=Host(`traefik.edgardovasquez.cl`)"
  #     - "traefik.http.routers.traefik.tls=true"
  #     - "traefik.http.routers.traefik.tls.certresolver=letsencrypt"
  #     - "traefik.http.routers.traefik.service=api@internal"
  #     - "traefik.http.routers.traefik.middlewares=auth"
  #     - "traefik.http.middlewares.auth.basicauth.users=${TRAEFIK_PASS_HASH:?Variable TRAEFIK_PASS_HASH no definida}"
  #   deploy:
  #     resources:
  #       limits:
  #         memory: 256M

  # =============================================================================
  # Prometheus — Métricas
  # =============================================================================
  prometheus:
    image: prom/prometheus:latest
    container_name: workflow-prometheus
    restart: unless-stopped
    networks:
      - mvp-network
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    deploy:
      resources:
        limits:
          memory: 256M

  # =============================================================================
  # Grafana — Dashboards
  # =============================================================================
  grafana:
    image: grafana/grafana:latest
    container_name: workflow-grafana
    restart: unless-stopped
    networks:
      - mvp-network
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:?Debe definir GRAFANA_ADMIN_USER en .env}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:?Debe definir GRAFANA_ADMIN_PASSWORD en .env}
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    deploy:
      resources:
        limits:
          memory: 256M

# =============================================================================
# Volúmenes persistentes
# =============================================================================
volumes:
  mongo-data:
  kafka-data:
  grafana-data:
  prometheus-data:
  temp-docs:

# =============================================================================
# Redes
# =============================================================================
# ambas redes son EXTERNAs: ya existen en el servidor (creadas por otro proyecto).
# El Traefik existente escanea la red traefik-net para descubrir contenedores.
# mvp-network es para comunicación interna entre nuestros servicios.
networks:
  mvp-network:
    external: true
  traefik-net:
    external: true
