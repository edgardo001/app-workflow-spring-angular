# =============================================================================
# Nginx Configuration — Frontend SPA + Backend Proxy
# =============================================================================
# Este archivo configura Nginx para:
#   1. Servir la SPA Angular (archivos estáticos)
#   2. Hacer proxy inverso de /api/ al backend Spring Boot
# =============================================================================

server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # --- SPA Routing ---
    # Angular usa routing del lado del cliente (RouterModule).
    # Todas las rutas (/dashboard, /flows, /login, etc.) son manejadas por index.html.
    # Sin esto, recargar la página en /dashboard daría 404 porque
    # Nginx buscaría un archivo物理 /dashboard que no existe.
    # try_files intenta servir el archivo, si no existe sirve index.html
    # y Angular se encarga del routing.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # --- Backend Proxy ---
    # En producción, el frontend y backend están en contenedores separados.
    # Nginx proxya las llamadas /api/ al contenedor "backend" en puerto 8080.
    # Esto permite que el frontend haga fetch('/api/flows') sin problemas de CORS.
    #
    # ¿Por qué "backend:8080"?
    #   - "backend" es el nombre del servicio en docker-compose.yml
    #   - Docker DNS resuelve ese nombre a la IP del contenedor
    #   - "8080" es el puerto que escucha Spring Boot
    #
    # Headers: X-Real-IP y X-Forwarded-For permiten al backend
    # saber la IP real del cliente (no la IP del contenedor Nginx).
    location /api/ {
        proxy_pass http://backend:8080/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
