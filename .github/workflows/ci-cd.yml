name: CI/CD - Build & Push to Docker Hub

on:
  push:
    branches: [main, feat/**]
  pull_request:
    branches: [main]

env:
  DOCKER_HUB_USERNAME: ${{ secrets.DOCKER_HUB_USERNAME }}
  BACKEND_IMAGE: ${{ secrets.DOCKER_HUB_USERNAME }}/workflow-net-backend
  FRONTEND_IMAGE: ${{ secrets.DOCKER_HUB_USERNAME }}/workflow-net-frontend

jobs:
  test-backend:
    name: Test Backend
    runs-on: ubuntu-latest
    container: eclipse-temurin:17-jdk-alpine
    defaults:
      run:
        working-directory: src/backend
    steps:
      - uses: actions/checkout@v4
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
      - run: chmod +x gradlew && ./gradlew test --no-daemon

  test-frontend:
    name: Test Frontend
    runs-on: ubuntu-latest
    container: node:22-alpine
    defaults:
      run:
        working-directory: src/frontend
    steps:
      - uses: actions/checkout@v4
      - run: npm ci
      - run: npx ng test --watch=false

  build-and-push:
    name: Build & Push Docker Images
    needs: [test-backend, test-frontend]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Build & Push Backend
        uses: docker/build-push-action@v6
        with:
          context: src/backend
          push: true
          tags: ${{ env.BACKEND_IMAGE }}:latest,${{ env.BACKEND_IMAGE }}:${{ github.sha }}

      - name: Build & Push Frontend
        uses: docker/build-push-action@v6
        with:
          context: src/frontend
          push: true
          tags: ${{ env.FRONTEND_IMAGE }}:latest,${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
